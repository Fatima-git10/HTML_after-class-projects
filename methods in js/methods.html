<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        var name = "cat"
        document.write(name)
        document.write("<br>")
        document.write(name.length)
        document.write("<br>")
        document.write(name.toLowerCase())
        document.write("<br>")
        document.write(name.toUpperCase())

    </script>
</body>

</html>
